name: Deploy to GitHub Pages

# Publishes the production build to the gh-pages branch, which GitHub Pages
# serves at https://<owner>.github.io/agile-pricer/. This route needs no
# repository-settings access: pushing gh-pages auto-enables Pages on public
# repos, unlike the Pages API used by actions/configure-pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      # Production ships only behind a green e2e suite; previously the e2e
      # job ran in a parallel workflow and could fail while deploy succeeded.
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - name: Publish dist to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          touch dist/.nojekyll
          cd dist
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA::8}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
